name: 일일 수주 공시 자동 업데이트

on:
  schedule:
    - cron: '0 23 * * *'  # 매일 오전 8시 KST (UTC 23:00)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install opendartreader python-dotenv

      - name: 일일 업데이트 실행
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python scripts/daily_update.py --days 3

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/orders.json
          git diff --cached --quiet || git commit -m "auto: 수주 데이터 업데이트 $(date +'%Y-%m-%d')"
          git push
